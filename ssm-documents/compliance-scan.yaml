---
schemaVersion: "2.2"
description: >
  Performs a lightweight compliance scan on Amazon Linux 2 instances.
  Validates OS-level security settings including open ports, running services,
  file permissions on sensitive paths, SSH configuration, and password policy.
  Intended for use by platform and security engineers to validate instance
  posture between formal assessments. Does not remediate — report only.

parameters:
  AllowedOpenPorts:
    type: String
    description: >
      Comma-separated list of ports expected to be open on this instance.
      Any port found open outside this list will be flagged.
    default: "22,443"
  CheckSSHConfig:
    type: String
    description: "Check SSH daemon configuration for common hardening settings."
    default: "true"
    allowedValues:
      - "true"
      - "false"
  CheckFilePermissions:
    type: String
    description: "Check permissions on sensitive system files."
    default: "true"
    allowedValues:
      - "true"
      - "false"

mainSteps:
  - name: ScanHeader
    action: aws:runShellScript
    description: Prints scan header with instance context for report correlation.
    inputs:
      runCommand:
        - echo "============================================"
        - echo "  SSM COMPLIANCE SCAN REPORT"
        - echo "============================================"
        - echo "Instance ID : $(curl -sf http://169.254.169.254/latest/meta-data/instance-id 2>/dev/null || echo 'unavailable')"
        - echo "Hostname    : $(hostname)"
        - echo "Region      : $(curl -sf http://169.254.169.254/latest/meta-data/placement/region 2>/dev/null || echo 'unavailable')"
        - echo "Scan Time   : $(date -u '+%Y-%m-%dT%H:%M:%SZ')"
        - echo "============================================"
        - echo ""
        - echo "LEGEND: [PASS] [FAIL] [WARN] [INFO]"
        - echo ""

  - name: CheckOpenPorts
    action: aws:runShellScript
    description: >
      Scans for listening ports on the instance and compares against
      the AllowedOpenPorts parameter. Flags unexpected open ports.
    inputs:
      runCommand:
        - echo "=== OPEN PORT SCAN ==="
        - ALLOWED="{{ AllowedOpenPorts }}"
        - |
          # Get all listening ports
          OPEN_PORTS=$(ss -tlnp | awk 'NR>1 {print $4}' | grep -oP '(?<=:)\d+$' | sort -un)

          IFS=',' read -ra ALLOWED_LIST <<< "$ALLOWED"

          for port in $OPEN_PORTS; do
            allowed=false
            for ap in "${ALLOWED_LIST[@]}"; do
              ap=$(echo "$ap" | xargs)
              if [ "$port" = "$ap" ]; then
                allowed=true
                break
              fi
            done
            if [ "$allowed" = true ]; then
              echo "[PASS] Port $port is open and expected"
            else
              echo "[FAIL] Port $port is open but NOT in allowed list"
            fi
          done
        - echo ""

  - name: CheckSSHConfiguration
    action: aws:runShellScript
    description: >
      Validates SSH daemon settings against common hardening expectations.
      Checks PermitRootLogin, PasswordAuthentication, and Protocol version.
      Only runs if CheckSSHConfig parameter is true.
    inputs:
      runCommand:
        - |
          if [ "{{ CheckSSHConfig }}" != "true" ]; then
            echo "=== SSH CONFIG CHECK SKIPPED ==="
            exit 0
          fi

          echo "=== SSH CONFIGURATION CHECK ==="
          SSHD_CONFIG="/etc/ssh/sshd_config"

          if [ ! -f "$SSHD_CONFIG" ]; then
            echo "[WARN] $SSHD_CONFIG not found — SSH may not be installed"
            exit 0
          fi

          # PermitRootLogin should be no
          ROOT_LOGIN=$(grep -i "^PermitRootLogin" "$SSHD_CONFIG" | awk '{print $2}' | tr '[:upper:]' '[:lower:]')
          if [ "$ROOT_LOGIN" = "no" ]; then
            echo "[PASS] PermitRootLogin is set to no"
          elif [ -z "$ROOT_LOGIN" ]; then
            echo "[WARN] PermitRootLogin not explicitly set (default may allow root)"
          else
            echo "[FAIL] PermitRootLogin is set to '$ROOT_LOGIN' — expected 'no'"
          fi

          # PasswordAuthentication should be no (key-based auth enforced)
          PASS_AUTH=$(grep -i "^PasswordAuthentication" "$SSHD_CONFIG" | awk '{print $2}' | tr '[:upper:]' '[:lower:]')
          if [ "$PASS_AUTH" = "no" ]; then
            echo "[PASS] PasswordAuthentication is set to no"
          elif [ -z "$PASS_AUTH" ]; then
            echo "[WARN] PasswordAuthentication not explicitly set (default allows passwords)"
          else
            echo "[FAIL] PasswordAuthentication is set to '$PASS_AUTH' — expected 'no'"
          fi

          # X11Forwarding should be no
          X11=$(grep -i "^X11Forwarding" "$SSHD_CONFIG" | awk '{print $2}' | tr '[:upper:]' '[:lower:]')
          if [ "$X11" = "no" ]; then
            echo "[PASS] X11Forwarding is set to no"
          elif [ -z "$X11" ]; then
            echo "[WARN] X11Forwarding not explicitly set"
          else
            echo "[FAIL] X11Forwarding is set to '$X11' — expected 'no'"
          fi

          echo ""

  - name: CheckFilePermissions
    action: aws:runShellScript
    description: >
      Validates permissions on sensitive system files.
      Checks /etc/passwd, /etc/shadow, /etc/sudoers, and /etc/ssh/sshd_config
      against expected permission modes.
    inputs:
      runCommand:
        - |
          if [ "{{ CheckFilePermissions }}" != "true" ]; then
            echo "=== FILE PERMISSION CHECK SKIPPED ==="
            exit 0
          fi

          echo "=== FILE PERMISSION CHECK ==="

          check_permission() {
            local file=$1
            local expected_octal=$2
            local description=$3

            if [ ! -e "$file" ]; then
              echo "[WARN] $file not found — skipping"
              return
            fi

            actual_octal=$(stat -c "%a" "$file")
            if [ "$actual_octal" = "$expected_octal" ]; then
              echo "[PASS] $file permissions are $actual_octal ($description)"
            else
              echo "[FAIL] $file permissions are $actual_octal — expected $expected_octal ($description)"
            fi
          }

          check_permission "/etc/passwd"          "644" "world-readable, not writable"
          check_permission "/etc/shadow"          "000" "no access outside root"
          check_permission "/etc/sudoers"         "440" "read-only for root and wheel"
          check_permission "/etc/ssh/sshd_config" "600" "root read/write only"

          echo ""

  - name: CheckSudoersEntries
    action: aws:runShellScript
    description: >
      Lists all sudoers entries including drop-in files under /etc/sudoers.d.
      Flags any NOPASSWD entries as these may indicate privilege escalation risk.
    inputs:
      runCommand:
        - echo "=== SUDOERS REVIEW ==="
        - |
          NOPASSWD_COUNT=0

          check_sudoers() {
            local file=$1
            if grep -q "NOPASSWD" "$file" 2>/dev/null; then
              echo "[FAIL] NOPASSWD entry found in $file:"
              grep "NOPASSWD" "$file" | sed 's/^/         /'
              NOPASSWD_COUNT=$((NOPASSWD_COUNT + 1))
            fi
          }

          check_sudoers "/etc/sudoers"
          for f in /etc/sudoers.d/*; do
            [ -f "$f" ] && check_sudoers "$f"
          done

          if [ "$NOPASSWD_COUNT" -eq 0 ]; then
            echo "[PASS] No NOPASSWD entries found in sudoers"
          fi

          echo ""

  - name: CheckOSPatching
    action: aws:runShellScript
    description: >
      Reports available security updates via yum. Does not install anything.
      Provides visibility into patch posture for compliance review.
    inputs:
      runCommand:
        - echo "=== AVAILABLE SECURITY UPDATES ==="
        - |
          UPDATE_COUNT=$(yum check-update --security -q 2>/dev/null | grep -v "^$" | wc -l)
          if [ "$UPDATE_COUNT" -eq 0 ]; then
            echo "[PASS] No pending security updates found"
          else
            echo "[FAIL] $UPDATE_COUNT security update(s) available:"
            yum check-update --security -q 2>/dev/null | grep -v "^$" | head -20
            if [ "$UPDATE_COUNT" -gt 20 ]; then
              echo "         ... and $((UPDATE_COUNT - 20)) more"
            fi
          fi
        - echo ""

  - name: ScanFooter
    action: aws:runShellScript
    description: Prints scan summary footer.
    inputs:
      runCommand:
        - echo "============================================"
        - echo "  SCAN COMPLETE"
        - echo "  Review all [FAIL] and [WARN] items above."
        - echo "  This scan is informational only."
        - echo "  No changes were made to this instance."
        - echo "============================================"
